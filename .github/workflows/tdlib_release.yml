name: TDLib Release

on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit, branch or tag to checkout'
        required: false
        default: ''

      # ==================== Windows 平台 ====================
      build_win_x64:
        description: '✅ Windows x64'
        type: boolean
        default: true

      win_x64_json:
        description: '   └─ Windows x64 JSON 接口版'
        type: boolean
        default: true

      win_x64_java:
        description: '   └─ Windows x64 Java 版'
        type: boolean
        default: false

      win_x64_csharp:
        description: '   └─ Windows x64 C# 版'
        type: boolean
        default: false

      build_win_x86:
        description: '✅ Windows x86'
        type: boolean
        default: false

      win_x86_json:
        description: '   └─ Windows x86 JSON 接口版'
        type: boolean
        default: false

      # ==================== Linux 平台 ====================
      build_linux_2204:
        description: '✅ Ubuntu 22.04'
        type: boolean
        default: true

      linux_2204_json:
        description: '   └─ Ubuntu 22.04 JSON 接口版'
        type: boolean
        default: true

      linux_2204_java:
        description: '   └─ Ubuntu 22.04 Java 版'
        type: boolean
        default: false

      build_linux_2004:
        description: '✅ Ubuntu 20.04'
        type: boolean
        default: false

      linux_2004_json:
        description: '   └─ Ubuntu 20.04 JSON 接口版'
        type: boolean
        default: false

      linux_2004_java:
        description: '   └─ Ubuntu 20.04 Java 版'
        type: boolean
        default: false

jobs:
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        platform:
          - arch: x64
            target: x64
          - arch: x86
            target: Win32
      fail-fast: false      # 默认 true，一个 Job 失败后取消其余所有 Job

    if: ${{ inputs.build_win_x64 || inputs.build_win_x86 }}

    steps:
      - name: Debug - Print All Inputs (Windows)
        shell: pwsh
        run: |
          Write-Host "=== Actions Inputs Debug (Windows) ===" -ForegroundColor Cyan
          Write-Host "commit                  = ${{ github.event.inputs.commit }}"
          Write-Host "platform                = ${{ matrix.platform.arch }} / ${{ matrix.platform.target }}"
          Write-Host "build_win_x64           = ${{ inputs.build_win_x64 }}"
          Write-Host "build_win_x86           = ${{ inputs.build_win_x86 }}"
          Write-Host "win_x64_json            = ${{ inputs.win_x64_json }}"
          Write-Host "win_x64_java            = ${{ inputs.win_x64_java }}"
          Write-Host "win_x64_csharp          = ${{ inputs.win_x64_csharp }}"
          Write-Host "win_x86_json            = ${{ inputs.win_x86_json }}"
          Write-Host "====================================="

      - name: Set Release Variables
        shell: pwsh
        run: |
          $commit = "${{ github.event.inputs.commit }}"
          if ($commit -eq '' -or $commit -eq 'master') {
            echo "RELEASE_VERSION=latest" >> $env:GITHUB_ENV
            echo "RELEASE_NAME=tdlib-latest-windows-${{ matrix.platform.arch }}" >> $env:GITHUB_ENV
          } else {
            echo "RELEASE_VERSION=$commit" >> $env:GITHUB_ENV
            echo "RELEASE_NAME=tdlib-$commit-windows-${{ matrix.platform.arch }}" >> $env:GITHUB_ENV
          }

      - name: Install dependencies (vcpkg)
        id: install_deps
        if: ${{ (matrix.platform.arch == 'x64' && inputs.build_win_x64) || (matrix.platform.arch == 'x86' && inputs.build_win_x86) }}
        run: vcpkg install gperf:${{ matrix.platform.arch }}-windows openssl:${{ matrix.platform.arch }}-windows zlib:${{ matrix.platform.arch }}-windows

      - name: Fail Job if step was skipped
        if: ${{ steps.install_deps.outcome == 'skipped' }}
        uses: actions/github-script@v8
        with:
          script: |
            core.setFailed('必要步骤 "Install dependencies (vcpkg)" 被跳过，终止构建')

      - name: Checkout TDLib
        uses: actions/checkout@v7
        with:
          repository: tdlib/td
          ref: ${{ github.event.inputs.commit }}

      # ==================== JSON 接口版 ====================
      - name: Build Windows JSON Interface
        if: ${{ (matrix.platform.arch == 'x64' && inputs.win_x64_json) || (matrix.platform.arch == 'x86' && inputs.win_x86_json) }}
        shell: pwsh
        run: |
          Remove-Item build,tdlib -Force -Recurse -ErrorAction SilentlyContinue
          mkdir build; cd build
          cmake -A ${{ matrix.platform.target }} -DCMAKE_INSTALL_PREFIX:PATH=../tdlib -DCMAKE_TOOLCHAIN_FILE:FILEPATH=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ..
          cmake --build . --target install --config Release
          copy Release\tg_cli.exe ..\tdlib\bin
          cd ..
          Compress-Archive $(Resolve-Path tdlib/*) ${{ env.RELEASE_NAME }}-json.zip

      # ==================== Java 版 ====================
      - name: Build Windows Java
        if: ${{ matrix.platform.arch == 'x64' && inputs.win_x64_java }}
        shell: pwsh
        run: |
          Remove-Item build,tdlib -Force -Recurse -ErrorAction SilentlyContinue
          mkdir build; cd build
          cmake -A ${{ matrix.platform.target }} -DCMAKE_INSTALL_PREFIX:PATH=../example/java/td -DTD_ENABLE_JNI=ON -DCMAKE_TOOLCHAIN_FILE:FILEPATH=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ..
          cmake --build . --target install --config Release
          cd ..
          cd example/java
          mkdir build; cd build
          cmake -A ${{ matrix.platform.target }} -DCMAKE_INSTALL_PREFIX:PATH=../../../tdlib -DCMAKE_TOOLCHAIN_FILE:FILEPATH=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DTd_DIR:PATH=$(Resolve-Path ../td/lib/cmake/Td) ..
          cmake --build . --target install --config Release
          cd ..
          Copy-Item org/ ../../tdlib -Recurse
          cd ../..
          Compress-Archive $(Resolve-Path tdlib/*) ${{ env.RELEASE_NAME }}-java.zip

      # ==================== C# 版 ====================
      - name: Build Windows CSharp
        if: ${{ matrix.platform.arch == 'x64' && inputs.win_x64_csharp }}
        shell: pwsh
        run: |
          Remove-Item build,tdlib -Force -Recurse -ErrorAction SilentlyContinue
          mkdir build; cd build
          cmake -A ${{ matrix.platform.target }} -DCMAKE_INSTALL_PREFIX:PATH=../tdlib -DTD_ENABLE_DOTNET=ON -DCMAKE_TOOLCHAIN_FILE:FILEPATH=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ..
          cmake --build . --target install --config Release
          copy Release\tg_cli.exe ..\tdlib\bin
          cd ..
          git checkout td/telegram/Client.h td/telegram/Log.h td/tl/TlObject.h
          Compress-Archive $(Resolve-Path tdlib/*) ${{ env.RELEASE_NAME }}-csharp.zip

      - name: Upload Windows Artifacts
        # if: ${{ always() }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: tdlib-${{ env.RELEASE_VERSION }}
          files: ${{ env.RELEASE_NAME }}*.zip
          overwrite_files: true

  linux:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-20.04]

    if: ${{ inputs.build_linux_2204 || inputs.build_linux_2004 }}

    steps:
      - name: Debug - Print All Inputs (Linux)
        run: |
          echo "=== Actions Inputs Debug (Linux) ==="
          echo "commit                = ${{ github.event.inputs.commit }}"
          echo "platform              = ${{ matrix.os }}"
          echo "build_linux_2204      = ${{ inputs.build_linux_2204 }}"
          echo "build_linux_2004      = ${{ inputs.build_linux_2004 }}"
          echo "linux_2204_json       = ${{ inputs.linux_2204_json }}"
          echo "linux_2204_java       = ${{ inputs.linux_2204_java }}"
          echo "linux_2004_json       = ${{ inputs.linux_2004_json }}"
          echo "linux_2004_java       = ${{ inputs.linux_2004_java }}"
          echo "=========================================="

      - name: Set Release Variables
        run: |
          COMMIT="${{ github.event.inputs.commit }}"
          if [ -z "$COMMIT" ] || [ "$COMMIT" = "master" ]; then
            echo "RELEASE_VERSION=latest" >> $GITHUB_ENV
            echo "RELEASE_NAME=tdlib-latest-${{ matrix.os }}-x86_64" >> $GITHUB_ENV
          else
            echo "RELEASE_VERSION=$COMMIT" >> $GITHUB_ENV
            echo "RELEASE_NAME=tdlib-$COMMIT-${{ matrix.os }}-x86_64" >> $GITHUB_ENV
          fi

      - name: Set Clang Version
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            echo "CLANG_VERSION=14" >> $GITHUB_ENV
          else
            echo "CLANG_VERSION=10" >> $GITHUB_ENV
          fi

      - name: Install System Dependencies
        id: install_deps
        if: ${{ (matrix.os == 'ubuntu-22.04' && inputs.build_linux_2204) || (matrix.os == 'ubuntu-20.04' && inputs.build_linux_2004) }}
        run: |
          sudo apt-get update
          sudo apt-get install -y make git zlib1g-dev libssl-dev gperf php-cli cmake clang-${{ env.CLANG_VERSION }} libc++-${{ env.CLANG_VERSION }}-dev libc++abi-${{ env.CLANG_VERSION }}-dev

      - name: Fail Job if step was skipped
        if: ${{ steps.install_deps.outcome == 'skipped' }}
        uses: actions/github-script@v8
        with:
          script: |
            core.setFailed('必要步骤 "Install System Dependencies" 被跳过，终止构建')

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Checkout TDLib
        uses: actions/checkout@v7
        with:
          repository: tdlib/td
          ref: ${{ github.event.inputs.commit }}

      # ==================== Linux JSON 接口版 ====================
      - name: Build Linux JSON Interface
        if: ${{ (matrix.os == 'ubuntu-22.04' && inputs.linux_2204_json) || (matrix.os == 'ubuntu-20.04' && inputs.linux_2004_json) }}
        env:
          CXXFLAGS: "-stdlib=libc++"
          CC: /usr/bin/clang-${{ env.CLANG_VERSION }}
          CXX: /usr/bin/clang++-${{ env.CLANG_VERSION }}
        run: |
          rm -rf build tdlib
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX:PATH=../tdlib ..
          cmake --build . --target install
          cd ..
          tar -czvf ${{ env.RELEASE_NAME }}-json.tar.gz tdlib/*

      # ==================== Linux Java 版 ====================
      - name: Build Linux Java
        if: ${{ (matrix.os == 'ubuntu-22.04' && inputs.linux_2204_java) || (matrix.os == 'ubuntu-20.04' && inputs.linux_2004_java) }}
        env:
          CXXFLAGS: "-stdlib=libc++"
          CC: /usr/bin/clang-${{ env.CLANG_VERSION }}
          CXX: /usr/bin/clang++-${{ env.CLANG_VERSION }}
        run: |
          rm -rf build tdlib
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX:PATH=../example/java/td -DTD_ENABLE_JNI=ON ..
          cmake --build . --target install
          cd ..
          cd example/java
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX:PATH=../../../tdlib -DTd_DIR:PATH=$(readlink -e ../td/lib/cmake/Td) ..
          cmake --build . --target install
          cd ..
          cp -r org/ ../../tdlib
          cd ../..
          tar -czvf ${{ env.RELEASE_NAME }}-java.tar.gz tdlib/*

      - name: Upload Linux Artifacts
        # if: ${{ always() }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: tdlib-${{ env.RELEASE_VERSION }}
          files: ${{ env.RELEASE_NAME }}*.tar.gz
          overwrite_files: true
